<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>JSON 확인</title>
</head>
<body>

<h2>JSON 확인</h2>

<pre id="output">로딩 중...</pre>

<script>

const API_URL =
"https://reb-office-vacancy-api.ipsw97.workers.dev/";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);

})
.catch(err => {

  document.getElementById("output").textContent =
    "오류: " + err;

});

</script>

</body>
</html>
