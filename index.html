<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>지역별 오피스 공실률</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:20px;
  font-family:Arial,sans-serif;
}

.chart-container{
  width:100%;
  height:700px;
}

canvas{
  max-width:100%;
}
</style>

</head>

<body>

<h2>지역별 오피스 공실률 추이</h2>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<script>

const API_URL =
"https://reb-office-vacancy-api.ipsw97.workers.dev/";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const rows = data.SttsApiTblData[1].row;

  const regions = [
    "전국",
    "서울",
    "부산",
    "대구",
    "인천",
    "경기"
  ];

  const nationalRows = rows
    .filter(r => r.CLS_NM === "전국")
    .sort((a,b)=>
      a.WRTTIME_IDTFR_ID.localeCompare(
        b.WRTTIME_IDTFR_ID
      )
    );

  const labels =
    nationalRows.map(r => r.WRTTIME_DESC);

  const datasets = regions.map(region => {

    const regionRows = rows
      .filter(r => r.CLS_NM === region)
      .sort((a,b)=>
        a.WRTTIME_IDTFR_ID.localeCompare(
          b.WRTTIME_IDTFR_ID
        )
      );

    return {
      label: region,
      data: regionRows.map(r => Number(r.DTA_VAL)),
      tension: 0.25
    };

  });

  new Chart(
    document.getElementById("chart"),
    {
      type: "line",
      data: {
        labels: labels,
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
          mode: 'index',
          intersect: false
        },

        plugins: {
          legend: {
            position: 'top'
          },
          title: {
            display: true,
            text: '지역별 오피스 공실률(%)'
          }
        },

        scales: {
          y: {
            title: {
              display: true,
              text: '공실률 (%)'
            }
          }
        }
      }
    }
  );

})
.catch(err => {

  document.body.innerHTML +=
    "<p>오류 발생: " + err + "</p>";

  console.error(err);

});

</script>

</body>
</html>
